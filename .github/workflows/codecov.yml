name: Codecov

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read
  pull-requests: write

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  coverage:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v6

      - name: Install Rust stable
        uses: actions-rust-lang/setup-rust-toolchain@v1.15.3
        with:
          toolchain: stable
          components: llvm-tools

      - name: Install just
        uses: taiki-e/install-action@v2.68.15
        with:
          tool: just

      - name: Install cargo-llvm-cov
        uses: taiki-e/install-action@v2.68.15
        with:
          tool: cargo-llvm-cov

      - name: Generate coverage file
        run: just test-coverage-codecov +stable

      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@v5
        with:
          files: ./codecov.json
          fail_ci_if_error: false
          verbose: true

      - name: Generate LCOV summary
        run: just test-coverage-lcov +stable

      - name: Upload LCOV summary
        uses: actions/upload-artifact@v4
        with:
          name: lcov-info
          path: lcov.info
