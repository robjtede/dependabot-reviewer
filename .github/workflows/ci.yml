name: CI

on:
  push:
    branches: [main]
  merge_group:
    types: [checks_requested]
  pull_request:
    branches: [main]

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v6

      - name: Install Rust stable
        uses: actions-rust-lang/setup-rust-toolchain@v1.15.3
        with:
          toolchain: stable

      - name: Install just
        uses: taiki-e/install-action@v2.68.15
        with:
          tool: just

      - name: Test
        run: just test

  check:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v6

      - name: Install Rust nightly
        uses: actions-rust-lang/setup-rust-toolchain@v1.15.3
        with:
          toolchain: nightly

      - name: Install just
        uses: taiki-e/install-action@v2.68.15
        with:
          tool: just

      - name: Check
        run: just check
